name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec MusicPlayer/project.yml

      - name: List project contents
        run: xcodebuild -project MusicPlayer/MusicPlayer.xcodeproj -list

      - name: Build .app
        run: |
          cd MusicPlayer
          xcodebuild -project MusicPlayer.xcodeproj \
            -target MusicPlayer \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r "MusicPlayer/build/Build/Products/Release-iphoneos/MusicPlayer.app" Payload/
          zip -r MusicPlayer.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer
          path: MusicPlayer.ipa
