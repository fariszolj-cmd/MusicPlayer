name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec MusicPlayer/project.yml

      - name: List project contents
        run: xcodebuild -project MusicPlayer/MusicPlayer.xcodeproj -list

      - name: Build .app
        run: xcodebuild -project MusicPlayer/MusicPlayer.xcodeproj -sdk iphoneos -derivedDataPath Build build -configuration Release

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r "Build/Build/Products/Release-iphoneos/MusicPlayer.app" Payload/ || cp -r "MusicPlayer/Build/Build/Products/Release-iphoneos/MusicPlayer.app" Payload/ 2>/dev/null || true
          zip -r MusicPlayer.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer
          path: MusicPlayer.ipa
